version: "3.8"

x-django-env: &django_env
  SECRET: ${SECRET}
  SITE_URL: ${SITE_URL}
  SUPER_USERS: ${SUPER_USERS}
  OAUTH_REDIRECT_URL: ${OAUTH_REDIRECT_URL}
  DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID}
  DISCORD_CLIENT_SECRET: ${DISCORD_CLIENT_SECRET}
  GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
  GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
  DJANGO_SUPERUSER_USERNAME: ${DJANGO_SUPERUSER_USERNAME}
  DJANGO_SUPERUSER_PASSWORD: ${DJANGO_SUPERUSER_PASSWORD}
  DJANGO_SUPERUSER_EMAIL: ${DJANGO_SUPERUSER_EMAIL}
  AWS_REGION_NAME: ${AWS_REGION_NAME}
  AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
  AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
  AWS_STORAGE_BUCKET_NAME: ${AWS_STORAGE_BUCKET_NAME}
  AWS_QUERYSTRING_EXPIRE: ${AWS_QUERYSTRING_EXPIRE}
  #DATABASE_TYPE: ${DATABASE_TYPE}
  DATABASE_NAME: ${DATABASE_NAME}
  DATABASE_USER: ${DATABASE_USER}
  DATABASE_PASS: ${DATABASE_PASS}
  DATABASE_HOST: ${DATABASE_HOST}
  DATABASE_PORT: ${DATABASE_PORT}
  SENTRY_URL: ${SENTRY_URL}
  SENTRY_SAMPLE_RATE: ${SENTRY_SAMPLE_RATE}
  SENTRY_DEBUG: ${SENTRY_DEBUG}
  SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT}
  APP_LOG_LEVEL: ${APP_LOG_LEVEL}
  DJANGO_LOG_LEVEL: ${DJANGO_LOG_LEVEL}
  #DATABSE_LOCATION: ${DATABSE_LOCATION}
  DEBUG: ${DEBUG}
  ALLOWED_HOSTS: ${ALLOWED_HOSTS}
  CSRF_ORIGINS: ${CSRF_ORIGINS}
  SESSION_COOKIE_AGE: ${SESSION_COOKIE_AGE}
  #STATIC_ROOT: ${STATIC_ROOT}
  #MEDIA_ROOT: ${MEDIA_ROOT}
  #USE_TZ: ${USE_TZ}
  LANGUAGE_CODE: ${LANGUAGE_CODE}
  TZ: ${TZ}
  USE_X_FORWARDED_HOST: ${USE_X_FORWARDED_HOST}
  SECURE_REFERRER_POLICY: ${SECURE_REFERRER_POLICY}
  CACHE_BACKEND: ${CACHE_BACKEND}
  CACHE_LOCATION: ${CACHE_LOCATION}
  CELERY_BROKER_URL: ${CELERY_BROKER_URL}
  CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND}
  REDIS_IGNORE_EXCEPTIONS: ${REDIS_IGNORE_EXCEPTIONS}
  RTMP_HOST: ${RTMP_HOST}
  RTMP_PORT: ${RTMP_PORT}
  # :-True (not a bare passthrough): Compose substitutes an unset var with an
  # empty string, and decouple's bool cast treats "" as False, not "unset" —
  # a bare ${TUS_ENABLED} would silently force this off for any stack whose
  # config file doesn't set it, defeating the on-by-default intent.
  TUS_ENABLED: ${TUS_ENABLED:-True}
  TUS_HOOK_SECRET: ${TUS_HOOK_SECRET}

services:
  nginx:
    build:
      context: nginx
    image: ghcr.io/django-files/django-files-nginx:${VERSION:-latest}
    ports:
      - target: 1935
        published: ${RTMP_PORT:-1936}
        protocol: tcp
        mode: host
    environment:
      SECRET: ${SECRET}
      RECORD_ENABLED: ${RECORD_ENABLED}
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
        reservations:
          memory: 128M
          cpus: "0.25"
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=traefik-public"
        - "traefik.constraint-label=traefik-public"
        - "traefik.http.routers.${STACK_NAME}-http.rule=Host(`${TRAEFIK_HOST}`)"
        - "traefik.http.routers.${STACK_NAME}-http.entrypoints=http"
        - "traefik.http.routers.${STACK_NAME}-http.middlewares=https-redirect"
        - "traefik.http.routers.${STACK_NAME}-https.rule=Host(`${TRAEFIK_HOST}`)"
        - "traefik.http.routers.${STACK_NAME}-https.entrypoints=https"
        - "traefik.http.routers.${STACK_NAME}-https.tls=true"
        - "traefik.http.routers.${STACK_NAME}-https.service=${STACK_NAME}"
        - "traefik.http.services.${STACK_NAME}.loadbalancer.server.port=80"
        - "traefik.http.services.${STACK_NAME}.loadbalancer.server.scheme=http"
    volumes:
      - static_dir:/data/static
      - /data/docker/${STACK_NAME}:/data/media
    depends_on:
      - app
    networks:
      - traefik-public
      - net-internal

  app:
    build:
      context: .
      dockerfile: app/Dockerfile
      args:
        - BUILD_SHA=${COMMIT_SHA}
    image: ghcr.io/django-files/django-files-app:${VERSION:-latest}
    environment: *django_env
    command: "gunicorn djangofiles.asgi:application -b 0.0.0.0:9000 -w 2 -k uvicorn.workers.UvicornWorker"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9000/app-health-check/"]
      interval: 1m
      timeout: 10s
      retries: 3
      start_period: 3s
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 1G
          cpus: "2.0"
        reservations:
          memory: 512M
          cpus: "0.5"
    volumes:
      - static_dir:/data/static
      - /data/docker/${STACK_NAME}:/data/media
    depends_on:
      - redis
    networks:
      - net-internal

  worker:
    image: ghcr.io/django-files/django-files-app:${VERSION:-latest}
    environment: *django_env
    command: "celery -A djangofiles worker -l INFO -c 4"
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
        reservations:
          memory: 1G
          cpus: "0.5"
    volumes:
      - /data/docker/${STACK_NAME}:/data/media
    depends_on:
      - app
      - redis
    networks:
      - net-internal

  beat:
    image: ghcr.io/django-files/django-files-app:${VERSION:-latest}
    environment: *django_env
    command: "celery -A djangofiles beat -l INFO -S django"
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
        reservations:
          memory: 128M
          cpus: "0.25"
    volumes:
      - /data/docker/${STACK_NAME}:/data/media
    depends_on:
      - app
      - redis
    networks:
      - net-internal

  tusd:
    image: tusproject/tusd:v2
    # uid 1000 matches the app/worker containers so the imported file and the
    # .info sidecar are deletable by the celery worker
    user: "1000:1000"
    environment:
      TUS_HOOK_SECRET: ${TUS_HOOK_SECRET}
      UPLOAD_MAX_SIZE: ${UPLOAD_MAX_SIZE}
    # tusd has no flag for static hook headers, so the shared hook secret
    # (TUS_HOOK_SECRET env, else the file the nginx entrypoint generates on
    # the shared volume) rides the hook URL as a query param
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        f=/data/media/db/tus-hook.secret
        t=0
        while [ -z "$${TUS_HOOK_SECRET:-}" ] && [ ! -s "$$f" ] && [ "$$t" -lt 60 ]; do
          [ "$$t" -eq 0 ] && echo "waiting for $$f (created by the nginx entrypoint)"
          sleep 1
          t=$$((t+1))
        done
        secret="$${TUS_HOOK_SECRET:-$$(cat "$$f" 2>/dev/null)}"
        [ -n "$$secret" ] || echo "WARNING: no tus hook secret found; the app will reject hook calls"
        # -max-size backs up the Django pre-create hook's UPLOAD_MAX_SIZE check
        # directly at the transport layer, so an oversized upload is rejected
        # even if the hook is ever down or misconfigured. tusd wants raw bytes,
        # not the K/M/G suffix nginx/Django accept, so convert here.
        u="$${UPLOAD_MAX_SIZE:-5G}"
        case "$$u" in ''|*[!0-9kKmMgG]*) u="5G";; esac
        n=$$(echo "$$u" | sed 's/[a-zA-Z]*$$//')
        case "$$u" in
          *[kK]) b=$$((n*1024));;
          *[mM]) b=$$((n*1024*1024));;
          *[gG]) b=$$((n*1024*1024*1024));;
          *) b=$$n;;
        esac
        exec tusd -behind-proxy -base-path /tus/ -upload-dir /data/media/tus -max-size "$$b" \
          -hooks-http "http://app:9000/api/tus/hook/?secret=$$secret" \
          -hooks-enabled-events pre-create,post-finish
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 128M
          cpus: "0.5"
        reservations:
          memory: 32M
          cpus: "0.1"
    volumes:
      - /data/docker/${STACK_NAME}:/data/media
    depends_on:
      - app
    networks:
      - net-internal

  redis:
    image: redis:7-alpine
    command: "redis-server --appendonly yes"
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
        reservations:
          memory: 256M
          cpus: "0.25"
    volumes:
      - /data/docker/${STACK_NAME}/redis:/data
    networks:
      - net-internal

networks:
  net-internal:
    driver: overlay
  traefik-public:
    external: true

volumes:
  static_dir:
