openapi: 3.0.0

info:
  title: Django Files
  description: |
    Django Files: [https://github.com/django-files/django-files](https://github.com/django-files/django-files)
  version: 0.14.6

servers:
  - url: /api
    description: Main
  - url: https://f-dev.cssnr.com/api
    description: Main Dev
  - url: https://f-s3.cssnr.com/api
    description: S3 Dev
  - url: https://f.cssnr.com/api
    description: Test Prod
  - url: http://localhost/api
    description: Local
  - url: https://intranet.cssnr.com/api
    description: Intranet

paths:
  /upload/:
    post:
      summary: Upload a File
      description: >
        Upload a file to the server with optional parameters. All option
        headers below are also accepted as multipart form fields.
      tags:
        - Files
      security:
        - Authorization: []

      parameters:
        - name: format
          in: header
          description: File Name Format
          required: false
          schema:
            type: string
        - name: expires-at
          in: header
          description: File Expiration
          required: false
          schema:
            type: string
        - name: strip-gps
          in: header
          required: false
          description: Strip Exif GPS Data
          schema:
            type: boolean
        - name: strip-exif
          in: header
          required: false
          description: Strip Exif Data
          schema:
            type: boolean
        - name: embed
          in: header
          required: false
          description: Show metadata on previews and embeds (meta_preview).
          schema:
            type: boolean
        - name: private
          description: Make File Private
          in: header
          required: false
          schema:
            type: boolean
        - name: password
          in: header
          required: false
          description: Password to protect file with.
          schema:
            type: string
        - name: auto-password
          description: Automatically set an autogenerated file password on upload.
          in: header
          required: false
          schema:
            type: boolean
        - name: tags
          description: >
            Comma-separated tags to apply to the file. Also accepted as a
            multipart form field (use the form field for non-ASCII tag names).
          in: header
          required: false
          schema:
            type: string

      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                info:
                  type: string
                  description: Information about the file.
                tags:
                  type: string
                  description: Comma-separated tags to apply to the file
                  example: work,screenshots

      responses:
        "200":
          description: A JSON array of file details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileUploadResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/UnauthorizedError"

  /remote/:
    post:
      summary: Upload a Remote URL
      description: Send a URL to be Downloaded as a File Upload.
      tags:
        - Files
      security:
        - Authorization: []

      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/URL"
            example:
              url: http://example.com/images/john.png

      responses:
        "200":
          description: A JSON array of file details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/URL"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/UnauthorizedError"

  /recent/:
    get:
      summary: Get Recent Uploads
      description: Get the Preview URLs for Recently Uploaded Files.
      tags:
        - Files
      security:
        - Authorization: []

      parameters:
        - name: amount
          in: query
          description: Amount of Files to Return
          required: false
          schema:
            type: integer

      responses:
        "200":
          description: A JSON array of file Preview URLs
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
                  example: http://example.com/u/john.jpg
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/UnauthorizedError"

  /stats/me/:
    get:
      summary: Get Current User Stats
      description: Returns dashboard stat cards and 90-day chart history for the authenticated user.
      tags:
        - Files
      security:
        - Authorization: []

      responses:
        "200":
          description: User stats and chart data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatsMe"
        "401":
          $ref: "#/components/responses/UnauthorizedError"

  /stats/server/:
    get:
      summary: Get Server-Wide Stats
      description: Returns server-wide stat cards and 90-day aggregated chart. Superuser only.
      tags:
        - Files
      security:
        - Authorization: []

      responses:
        "200":
          description: Server stats and chart data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatsServer"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          description: Forbidden — superuser access required

  /shorts/:
    get:
      summary: Get Recent Short URLs
      description: Get a list of short URLs created by the user
      tags:
        - URLs
      security:
        - Authorization: []

      parameters:
        - name: amount
          in: query
          description: Amount of Short URLs to Return
          required: false
          schema:
            type: integer
        - name: start
          in: query
          description: Starting index for pagination
          required: false
          schema:
            type: integer
        - name: since
          in: query
          description: Return Short URLs with ID greater than this value
          required: false
          schema:
            type: integer

      responses:
        "200":
          description: A JSON array of Short URLs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ShortURLDetails"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/UnauthorizedError"

  /shorten/:
    post:
      summary: Shorten a URL
      description: Shorten a URL using header parameters or a JSON encoded body.
      tags:
        - URLs
      security:
        - Authorization: []

      parameters:
        - name: url
          in: header
          description: URL to Shorten
          required: false
          schema:
            type: string
        - name: vanity
          in: header
          description: Vanity Name for URL
          required: false
          schema:
            type: string
        - name: max-views
          in: header
          description: Max URL Views
          required: false
          schema:
            type: integer

      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ShortURL"
            example:
              url: http://example.com/really-long-url.html
              vanity: ab12
              max-views: 1

      responses:
        "200":
          description: A JSON array of the Short URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/URL"
              example:
                url: http://example.com/s/ab12
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/UnauthorizedError"

  /files/{page}/:
    get:
      summary: Get paginated files list.
      description: Get a paginated list of files.
      tags:
        - Files
      security:
        - Authorization: []

      parameters:
        - name: page
          in: path
          description: Which page to return
          required: true
          schema:
            type: integer
        - name: ordering
          in: query
          description: |
            Field to order results by. Prefix with `-` for descending.
            Comma-separate multiple keys for tiebreaking.
            Defaults to `-created` (newest first).
          required: false
          schema:
            type: string
            enum:
              - created
              - -created
              - size
              - -size
              - name
              - -name
        - name: has_gps
          in: query
          description: Filter to only files that have GPS EXIF data.
          required: false
          schema:
            type: boolean

      responses:
        "200":
          description: A JSON array of file Preview URLs
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
                  example: http://example.com/u/john.jpg
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/UnauthorizedError"

  /invites/:
    post:
      summary: Create an Invite
      description: Create a new User Invite.
      tags:
        - Users
      security:
        - Authorization: []

      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Invite"

      responses:
        "200":
          description: A JSON object of the Invites
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserInvites"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/UnauthorizedError"

    get:
      summary: Get all Invites
      description: Get all User Invites.
      tags:
        - Users
      security:
        - Authorization: []

      responses:
        "200":
          description: A JSON array of the Invites
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserInvites"

        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/UnauthorizedError"

  /token/:
    post:
      summary: Regenerate an api token
      description: Regenerates API token for current user and returns new token
      tags:
        - Users
      security:
        - Authorization: []
      responses:
        "200":
          description: A raw string value of the token.
          content:
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
    get:
      summary: Get the current api token.
      description: Get the current api token, expects cookie authentication.
      tags:
        - Users
      security:
        - Authorization: []
      responses:
        "200":
          description: A raw string value of the token.
          content:
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/UnauthorizedError"

  /webhooks/:
    get:
      summary: Get all Webhooks
      description: Get all Webhooks owned by the current user.
      tags:
        - Webhooks
      security:
        - Authorization: []

      responses:
        "200":
          description: A JSON object with the user's Webhooks
          content:
            application/json:
              schema:
                type: object
                properties:
                  webhooks:
                    type: array
                    items:
                      $ref: "#/components/schemas/Webhook"
        "401":
          $ref: "#/components/responses/UnauthorizedError"

    post:
      summary: Create a Webhook
      description: Create a new Webhook. Name and URL are required.
      tags:
        - Webhooks
      security:
        - Authorization: []

      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WebhookRequest"

      responses:
        "201":
          description: A JSON object of the created Webhook
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Webhook"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/UnauthorizedError"

  /webhooks/{id}/:
    get:
      summary: Get a Webhook
      description: Get a single Webhook by ID. Users can only access their own webhooks.
      tags:
        - Webhooks
      security:
        - Authorization: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer

      responses:
        "200":
          description: A JSON object of the Webhook
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Webhook"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          description: Webhook not found

    patch:
      summary: Update a Webhook
      description: Partially update a Webhook. Only supplied fields are changed.
      tags:
        - Webhooks
      security:
        - Authorization: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer

      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WebhookRequest"

      responses:
        "200":
          description: A JSON object of the updated Webhook
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Webhook"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          description: Webhook not found

    delete:
      summary: Delete a Webhook
      description: Delete a Webhook by ID.
      tags:
        - Webhooks
      security:
        - Authorization: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer

      responses:
        "204":
          description: Webhook deleted
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          description: Webhook not found

  /webhooks/{id}/test/:
    post:
      summary: Test a Webhook
      description: Synchronously fire a webhook.test event to the Webhook URL.
      tags:
        - Webhooks
      security:
        - Authorization: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer

      responses:
        "200":
          description: Result of the test delivery
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  status_code:
                    type: integer
                    example: 200
                  error:
                    type: string
                    description: Present when the request failed to send
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          description: Webhook not found

components:
  securitySchemes:
    Authorization:
      type: apiKey
      in: header
      name: Authorization

  responses:
    BadRequest:
      description: Missing required or malformed parameter
    UnauthorizedError:
      description: Access token is missing or invalid

  schemas:
    Webhook:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: My Webhook
        webhook_type:
          type: string
          enum: [custom, discord]
          example: custom
        scope:
          type: string
          enum: [user, site]
          example: user
          description: >
            user = events for the owner's actions only; site = events for all
            users (superuser only). user.created / user.deleted require site scope.
        url:
          type: string
          example: https://example.com/hooks/django-files
        secret:
          type: string
          description: HMAC-SHA256 signing secret for custom webhooks
        active:
          type: boolean
          example: true
        events:
          type: array
          items:
            type: string
            enum:
              - file.upload
              - file.deleted
              - album.created
              - album.updated
              - album.deleted
              - short.created
              - short.deleted
              - stream.live
              - stream.offline
              - user.created
              - user.deleted
              - user.login
          example: [file.upload, album.created]
        filters:
          type: object
          description: >
            Event filters. tags filters file.*, album.*, and stream.* events by tag:
            matching is case-insensitive, a "!" prefix excludes, and exclusions
            win. Empty object = no filtering.
          properties:
            tags:
              type: array
              items:
                type: string
              example: [work, "!private"]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    WebhookRequest:
      type: object
      properties:
        name:
          type: string
          example: My Webhook
        webhook_type:
          type: string
          enum: [custom, discord]
          default: custom
        scope:
          type: string
          enum: [user, site]
          default: user
          description: site scope requires superuser
        url:
          type: string
          example: https://example.com/hooks/django-files
        secret:
          type: string
          description: Optional HMAC-SHA256 signing secret (custom webhooks only)
        active:
          type: boolean
          default: true
        events:
          type: array
          items:
            type: string
          example: [file.upload]
        filters:
          type: object
          description: >
            Optional event filters. tags filters file, album, and stream events by tag;
            prefix a tag with "!" to exclude. Maximum 50 tags.
          properties:
            tags:
              type: array
              items:
                type: string
              example: [work, "!private"]
      required:
        - name
        - url

    FileUploadResponse:
      type: object
      properties:
        files:
          type: array
          items:
            type: string
            example: http://example.com/u/john.jpg
        url:
          type: string
          example: http://example.com/u/john.jpg
        raw:
          type: string
          example: http://example.com/r/john.jpg
        name:
          type: string
          example: john.jpg
        size:
          type: integer
          format: int64
          example: 1000

    StatCard:
      type: object
      properties:
        icon:
          type: string
          example: fa-regular fa-folder-open
        bg:
          type: string
          example: primary
        value:
          oneOf:
            - type: integer
            - type: string
          example: 42
        label:
          type: string
          example: Files
        sublabel:
          type: string
          description: Optional detail line, e.g. quota usage fraction.
          example: 1.2 GB / 10 GB

    StatsChart:
      type: object
      properties:
        days:
          type: array
          items:
            type: string
          example: ["6/1", "6/2"]
        files:
          type: array
          items:
            type: integer
          example: [10, 12]
        size:
          type: array
          items:
            type: integer
          example: [1048576, 2097152]
        shorts:
          type: array
          items:
            type: integer
          example: [3, 5]

    MimeType:
      type: object
      properties:
        mime:
          type: string
          example: image/jpeg
        count:
          type: integer
          example: 42
        size:
          type: integer
          format: int64
          example: 10485760
        human_size:
          type: string
          example: 10.0 MB

    StatsMe:
      type: object
      properties:
        has_stats:
          type: boolean
          example: true
        updated_at:
          type: string
          nullable: true
          example: "6/15 2:30 PM"
        stat_cards:
          type: array
          items:
            $ref: "#/components/schemas/StatCard"
        types:
          type: array
          description: Per-MIME-type file counts and sizes, sorted by count descending.
          items:
            $ref: "#/components/schemas/MimeType"
        chart:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/StatsChart"

    StatsServer:
      type: object
      properties:
        stat_cards:
          type: array
          items:
            $ref: "#/components/schemas/StatCard"
        types:
          type: array
          description: Server-wide per-MIME-type file counts and sizes, sorted by count descending.
          items:
            $ref: "#/components/schemas/MimeType"
        chart:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/StatsChart"

    URL:
      type: object
      required:
        - url
      properties:
        url:
          type: string
          example: http://example.com/u/john.png

    ShortURL:
      type: object
      required:
        - url
      properties:
        url:
          type: string
          example: http://example.com/s/ab12
        vanity:
          type: string
          example: ab12
        max-views:
          type: string
          example: 1

    Invite:
      type: object
      properties:
        expire:
          type: string
          example: 1mo
        max_uses:
          type: integer
          example: 1
        super_user:
          type: boolean
          example: false

    UserInvites:
      type: object
      properties:
        id:
          type: integer
          example: 1
        invite:
          type: string
          example: abcdefgh12345678
        owner:
          type: integer
          example: 1
        expire:
          type: string
          example: 1mo
        max_uses:
          type: integer
          example: 1
        super_user:
          type: boolean
          example: false
        created_at:
          type: string
          example: unknown
        updated_at:
          type: string
          example: unknown

    ShortURLDetails:
      type: object
      properties:
        id:
          type: integer
          example: 1
        short:
          type: string
          example: ab12
        url:
          type: string
          example: http://example.com/really-long-url.html
        max:
          type: integer
          example: 5
        views:
          type: integer
          example: 2
        user:
          type: integer
          example: 1
        created_at:
          type: string
          format: date-time
          example: "2023-01-01T12:00:00Z"
        updated_at:
          type: string
          format: date-time
          example: "2023-01-01T12:00:00Z"
        full_url:
          type: string
          example: http://example.com/s/ab12

security:
  - Authorization: []
