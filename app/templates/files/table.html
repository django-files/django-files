{% load home_tags %}
{% load static %}

<div id="files-table-section">
<p class="d-xl-none text-muted mb-0 table-narrow-msg"><em>Some columns hidden due to narrow viewport.</em></p>
<div class="dt-blur-strip" aria-hidden="true"></div>
<table class="display responsive nowrap table table-hover table-responsive mb-0 dt-select-no-highlight w-100" id="files-table"
       data-skeleton-cols="18,155,58,60,112,100,14,14,14,28,18:30" data-skeleton-rows="{{ skeleton_rows|default:'40' }}">
    <caption class="visually-hidden">List of Files</caption>
    <thead>
    <tr>
        <th scope="col" class=""></th>
        <th scope="col" class="" title="File Name">File</th>
        <th scope="col" class="" title="File Size">Size</th>
        <th scope="col" class="" title="MIME Type">MIME</th>
        <th scope="col" class="" title="UTC Date">Date</th>
        <th scope="col" class="" title="EXIF Capture Date">EXIF Date</th>
        <th scope="col" class="" title="File Expire">Expire</th>
        <th scope="col" class="" title="Password"><i class="fa-solid fa-key"></i></th>
        <th scope="col" class="" title="Private"><i class="fa-solid fa-lock"></i></th>
        <th scope="col" class="" title="Views"><i class="fa-solid fa-eye"></i></th>
        <th scope="col" class="text-center" title="Context Menu"><i class="fa-solid fa-ellipsis"></i></th>
    </tr>
    </thead>
    <tbody></tbody>
</table>

<div class="d-none">
    <input type="hidden" value="{{ site_settings.site_url }}" id="site_url">
    <i class="fa-solid fa-lock me-1"></i>
    <i class="fa-solid fa-key me-1"></i>
    <i class="fa-regular fa-hourglass me-1 expireStatus"></i>
    <i class="fa-regular fa-square-caret-down"></i>
    <i class="fa-solid fa-lock-open fa-fw me-2 privateIcon"></i>
    <img src="{% static 'images/assets/loading.gif' %}" class="img-responsive gallery-image" alt="Loading Files..." loading="lazy">
    <div class="dj-file-link">
        <span class="d-none d-sm-inline me-1">
            <a class="link-body-emphasis clip dj-file-link-clip" role="button">
                <i class="fa-regular fa-clipboard"></i></a>
        </span>
        <a class="link-body-emphasis dj-file-link-ref" aria-label="file-name"></a>
    </div>
</div>
</div><!-- /#files-table-section -->
