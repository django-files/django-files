{% comment %}
Shared confirmation modal for stream deletion. Wired by streams-actions.js
(see ensureDeleteModal). Included from streams.html and live.html.
{% endcomment %}
<div class="modal fade" id="delete-stream-modal" tabindex="-1" aria-labelledby="delete-stream-label" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h1 class="modal-title fs-5" id="delete-stream-label">Delete Stream</h1>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body" id="delete-stream-body">Are you sure you want to delete this stream?</div>
            <div class="modal-footer">
                <button type="button" class="btn btn-danger" id="stream-delete-confirm">Delete
                    <i class="fa-regular fa-trash-can ms-1"></i></button>
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
            </div>
        </div>
    </div>
</div>
