<div class="modal fade" id="albumPasswordModal" tabindex="-1" aria-labelledby="albumPasswordModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h1 class="modal-title fs-5" id="albumPasswordModalLabel">Set Album Password</h1>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <p>
                    Setting a password gates viewer access to this album. Viewers will need to enter
                    the password before they can browse the album. Clear the field and save to remove the password.
                </p>
                <form id="modal-album-password-form" name="modal-album-password-form">
                    <label for="album-password-input" class="form-label">Password</label>
                    <div class="input-group w-100">
                        <input type="text" class="form-control" id="album-password-input" name="password" autocomplete="off">
                        <button type="button" title="Unmask password" id="album-password-unmask" class="btn btn-secondary btn-sm"><i class="fa-solid fa-eye me-1"></i></button>
                        <button type="button" title="Copy password" id="album-password-copy" class="btn btn-warning btn-sm"><i class="fa-regular fa-copy"></i></button>
                        <button type="button" title="Generate new password" id="album-password-generate" class="btn btn-info btn-sm"><i class="fa-solid fa-key"></i></button>
                    </div>
                    <input type="hidden" name="pk" value="">
                </form>
            </div>
            <div class="modal-footer">
                <button type="submit" class="btn btn-success" form="modal-album-password-form">
                    Save <i class="fas fa-lock ms-1"></i></button>
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
            </div>
        </div>
    </div>
</div>
