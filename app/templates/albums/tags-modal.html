<div class="modal fade" id="album-tags-modal" tabindex="-1" aria-labelledby="album-tags-label" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h1 class="modal-title fs-5" id="album-tags-label">Album Tags</h1>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <div class="tag-container mb-3" id="album-tags-container">
                    <span class="text-muted small d-none" id="album-tags-empty">No tags yet.</span>
                </div>
                <form id="album-tag-add-form" autocomplete="off">
                    <div class="input-group">
                        <label for="album-tag-input" class="visually-hidden">Add tag</label>
                        <input type="text" class="form-control" id="album-tag-input"
                               placeholder="Add tag…" maxlength="255">
                        <button type="submit" class="btn btn-primary" id="album-tag-add-btn">
                            Add <i class="fa-solid fa-plus ms-1"></i></button>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
            </div>
        </div>
    </div>
</div>
