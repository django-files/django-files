{% load static %}
{% load home_tags %}

<div class="modal fade" id="fileUploadModal" tabindex="-1" aria-labelledby="fileUploadModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg modal-fullscreen-sm-down">
        <div class="modal-content">
            <div class="modal-header">
                <h1 class="modal-title fs-5" id="fileUploadModalLabel">Upload New File</h1>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-footer">
                <div class="container-fluid h-100">
                    {% include 'files/uppy-form.html' %}
                </div>
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="clipboardUploadModal" tabindex="-1" aria-labelledby="clipboardUploadModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg modal-fullscreen-sm-down">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="clipboardUploadModalLabel">
                    <i class="fa-regular fa-clipboard me-2" aria-hidden="true"></i>Upload from Clipboard
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <div id="clipboard-text-section">
                    <div class="mb-3">
                        <label for="clipboard-text-name" class="form-label">File Name</label>
                        <input type="text" class="form-control" id="clipboard-text-name" placeholder="paste.txt">
                    </div>
                    <div class="mb-0">
                        <label for="clipboard-text-content" class="form-label">Text</label>
                        <textarea class="form-control font-monospace" id="clipboard-text-content" rows="10" spellcheck="false"></textarea>
                    </div>
                </div>
                <div id="clipboard-file-section" class="d-none">
                    <div id="clipboard-file-preview" class="text-center mb-3"></div>
                    <p id="clipboard-file-info" class="text-body-secondary small mb-3"></p>
                    <div class="mb-0">
                        <label for="clipboard-file-name" class="form-label">
                            Custom Name <span class="text-body-secondary fw-normal">(optional)</span>
                        </label>
                        <input type="text" class="form-control" id="clipboard-file-name">
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" id="clipboard-upload-btn">
                    <i class="fa-solid fa-upload me-1" aria-hidden="true"></i> Upload
                </button>
            </div>
        </div>
    </div>
</div>

<script>
    const uploadUrl = "{% url 'api:upload' %}"
</script>
