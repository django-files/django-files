{% comment %}
Generic delete-only bulk-actions dropdown for pages using the shared toolbar
(albums, shorts). The richer files variant lives in files/bulk-menu.html.

Required context:
  bulk_entity — singular noun (e.g. "album", "short URL") used in modal text
{% endcomment %}
<div id="dt-bulk-wrapper" class="dropdown">
    <button id="bulk-actions" class="btn btn-sm btn-outline-secondary dropdown-toggle" type="button"
            data-bs-toggle="dropdown" aria-expanded="false" disabled>
        Bulk Actions
    </button>
    <ul class="dropdown-menu">
        <li>
            <a role="button" class="dropdown-item bulk-delete" title="Bulk Delete">
                <i class="fa-regular fa-trash-can fa-fw me-2 link-danger"></i> Delete</a>
        </li>
    </ul>
</div>
