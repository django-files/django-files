{# Unified toolbar for /shorts/ — mirrors the files-toolbar chrome. #}
<div class="files-toolbar" id="shorts-toolbar" aria-label="Shorts toolbar">
    <span class="files-toolbar-title">
        <i class="fa-solid fa-link me-2" aria-hidden="true"></i>Shorts
    </span>

    <div class="files-toolbar-search" id="shorts-toolbar-search">
        <label class="visually-hidden" for="shorts-toolbar-search-input">Search shorts</label>
        <i class="fa-solid fa-magnifying-glass files-toolbar-search-icon" aria-hidden="true"></i>
        <input type="search" id="shorts-toolbar-search-input" class="form-control form-control-sm"
               placeholder="Search shorts…" autocomplete="off">
    </div>

    <div class="files-toolbar-filters" id="shorts-toolbar-filters">
        {% if request.user.is_superuser %}
            {% include 'include/user-select.html' %}
        {% endif %}
    </div>

    <div class="files-toolbar-actions">
        <span class="files-toolbar-count text-body-secondary small text-nowrap" id="dt-short-count-wrapper">
            <span class="files-toolbar-count-label">Showing</span>
            <strong id="total-shorts-count">0</strong>
        </span>
        <button class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#create-short-modal">
            <i class="fa-solid fa-link me-2" aria-hidden="true"></i>New Short
        </button>
    </div>
</div>
