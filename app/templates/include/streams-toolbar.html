{# Unified toolbar for /streams/ — mirrors the files-toolbar chrome. #}
<div class="files-toolbar" id="streams-toolbar" aria-label="Streams toolbar">
    <span class="files-toolbar-title">
        <i class="fa-solid fa-satellite-dish me-2" aria-hidden="true"></i>Streams
    </span>

    <div class="files-toolbar-search" id="streams-toolbar-search">
        <label class="visually-hidden" for="streams-toolbar-search-input">Search streams</label>
        <i class="fa-solid fa-magnifying-glass files-toolbar-search-icon" aria-hidden="true"></i>
        <input type="search" id="streams-toolbar-search-input" class="form-control form-control-sm"
               placeholder="Search streams…" autocomplete="off">
    </div>

    <div class="files-toolbar-filters" id="streams-toolbar-filters">
        {% if request.user.is_superuser %}
            {% include 'include/user-select.html' %}
        {% endif %}
    </div>

    <div class="files-toolbar-actions">
        <span class="files-toolbar-count text-body-secondary small text-nowrap" id="dt-stream-count-wrapper">
            <span class="files-toolbar-count-label">Showing</span>
            <strong id="total-streams-count">0</strong>
        </span>
        {% if request.user.is_authenticated %}
        <button class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#obsSetupModal"
                title="Get OBS setup instructions for a new stream">
            <i class="fa-solid fa-satellite-dish me-1" aria-hidden="true"></i> Stream with OBS
        </button>
        {% endif %}
    </div>
</div>
