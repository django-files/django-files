[supervisord]
nodaemon=true
user=root

[program:redis]
command=redis-server /etc/redis/redis.conf
directory=/data/media/redis
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
autorestart=true
priority=800

[program:tusd]
# Loopback-only: only nginx in this same container needs to reach it. The
# hook secret file already exists by the time supervisord starts (written by
# nginx/60-sign-secret.sh, which runs in docker/docker-entrypoint.sh before
# `exec "$@"` launches supervisord) — no cross-container wait-loop needed
# here, unlike the sidecar wrapper script in the compose stacks.
command=bash -c 'exec tusd -behind-proxy -host 127.0.0.1 -port 8080 -base-path /tus/ -upload-dir /data/media/tus -hooks-http "http://app:9000/api/tus/hook/?secret=$(cat /data/media/db/tus-hook.secret)" -hooks-enabled-events pre-create,post-finish'
directory=/data
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
autorestart=true
priority=850
user=app

[program:app]
command=bash docker-entrypoint.sh gunicorn djangofiles.asgi:application -b 0.0.0.0:9000 -w 2 -k uvicorn.workers.UvicornWorker
directory=/app
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
autorestart=true
priority=900
user=app
startsecs=5

[program:worker]
command=bash docker-entrypoint.sh celery -A djangofiles worker -l INFO -c 4 --max-tasks-per-child 100
directory=/app
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
autorestart=true
priority=901
user=app
startsecs=5

[program:beat]
command=bash docker-entrypoint.sh celery -A djangofiles beat -l INFO -S django
directory=/app
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
autorestart=true
priority=902
user=app
startsecs=5

[program:nginx]
command=sh /nginx-entrypoint.sh
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
autorestart=true
priority=910
