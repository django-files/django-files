services:
  nginx:
    build: ./nginx
    image: djangofiles-nginx:${VERSION:-latest}
    env_file: settings.env
    deploy:
      mode: global
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=traefik-public"
        - "traefik.constraint-label=traefik-public"
        - "traefik.http.routers.STACK_NAME-http.rule=Host(`${TRAEFIK_HOST:-}`)"
        - "traefik.http.routers.STACK_NAME-http.entrypoints=http"
        - "traefik.http.routers.STACK_NAME-http.middlewares=https-redirect"
        - "traefik.http.routers.STACK_NAME-https.rule=Host(`${TRAEFIK_HOST:-}`)"
        - "traefik.http.routers.STACK_NAME-https.entrypoints=https"
        - "traefik.http.routers.STACK_NAME-https.tls=true"
        - "traefik.http.services.STACK_NAME.loadbalancer.server.port=80"
        - "traefik.http.services.STACK_NAME.loadbalancer.server.scheme=http"
    volumes:
      - ${APP_FILES_STATIC:-./app/static}:/data/static
      - logs_dir:/logs
      - media_dir:/data/media
      - ${APP_FILES:-./app}:/app
    depends_on:
      - app
    ports:
      - "80:80"

  app:
    build:
      context: .
      dockerfile: app/Dockerfile
      args:
        - BUILD_SHA=${COMMIT_SHA}
    image: djangofiles-app:${VERSION:-latest}
    env_file: settings.env
    command: "watchmedo auto-restart -d /app -p '*.py' -R -- gunicorn djangofiles.asgi:application -b 0.0.0.0:9000 -w 2 -k uvicorn.workers.UvicornWorker"
    deploy:
      mode: global
    volumes:
      - ${APP_FILES_STATIC:-./app/static}:/data/static
      - media_dir:/data/media
      - ${APP_FILES:-./app}:/app
    depends_on:
      - redis

  worker:
    image: djangofiles-app:${VERSION:-latest}
    env_file: settings.env
    command: "watchmedo auto-restart -d /app -p '*.py' -R -- celery -A djangofiles worker -l INFO -c 4"
    deploy:
      replicas: 1
    volumes:
      - media_dir:/data/media
      - logs_dir:/logs
      - ${APP_FILES:-./app}:/app
    depends_on:
      - app
      - redis

  beat:
    image: djangofiles-app:${VERSION:-latest}
    env_file: settings.env
    command: "celery -A djangofiles beat -l INFO -S django"
    deploy:
      replicas: 1
    volumes:
      - media_dir:/data/media
    depends_on:
      - app
      - redis

  tusd:
    image: tusproject/tusd:v2
    # uid 1000 matches the app/worker containers so the imported file and the
    # .info sidecar are deletable by the celery worker
    user: "1000:1000"
    env_file: settings.env
    # tusd has no flag for static hook headers, so the shared hook secret
    # (TUS_HOOK_SECRET env, else the file the nginx entrypoint generates on
    # the shared volume) rides the hook URL as a query param
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        f=/data/media/db/tus-hook.secret
        t=0
        while [ -z "$${TUS_HOOK_SECRET:-}" ] && [ ! -s "$$f" ] && [ "$$t" -lt 60 ]; do
          [ "$$t" -eq 0 ] && echo "waiting for $$f (created by the nginx entrypoint)"
          sleep 1
          t=$$((t+1))
        done
        secret="$${TUS_HOOK_SECRET:-$$(cat "$$f" 2>/dev/null)}"
        [ -n "$$secret" ] || echo "WARNING: no tus hook secret found; the app will reject hook calls"
        # -max-size backs up the Django pre-create hook's UPLOAD_MAX_SIZE check
        # directly at the transport layer, so an oversized upload is rejected
        # even if the hook is ever down or misconfigured. tusd wants raw bytes,
        # not the K/M/G suffix nginx/Django accept, so convert here.
        u="$${UPLOAD_MAX_SIZE:-5G}"
        case "$$u" in ''|*[!0-9kKmMgG]*) u="5G";; *) ;; esac
        n=$$(echo "$$u" | sed 's/[a-zA-Z]*$$//')
        case "$$u" in
          *[kK]) b=$$((n*1024));;
          *[mM]) b=$$((n*1024*1024));;
          *[gG]) b=$$((n*1024*1024*1024));;
          *) b=$$n;;
        esac
        exec tusd -behind-proxy -base-path /tus/ -upload-dir /data/media/tus -max-size "$$b" \
          -hooks-http "http://app:9000/api/tus/hook/?secret=$$secret" \
          -hooks-enabled-events pre-create,post-finish
    deploy:
      replicas: 1
    volumes:
      - media_dir:/data/media
    depends_on:
      - app
      - nginx

  redis:
    image: redis:7-alpine
    command: "redis-server --appendonly yes"
    deploy:
      replicas: 1
    volumes:
      - redis_data:/data

volumes:
  static_dir:
  redis_data:
  logs_dir:
  media_dir:
