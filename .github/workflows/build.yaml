name: "Build"

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tags:
        description: "Override Tags: comma,separated"
        required: false

env:
  REGISTRY: "ghcr.io"
  USER: "django-files"
  REPO: "django-files"
  PRE_TAG: "prerelease"

jobs:
  build:
    name: "Build"
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      packages: write

    steps:
      - name: "Checkout"
        uses: actions/checkout@v6

      - name: "Expand Override Tags"
        id: override
        env:
          INPUT_TAGS: ${{ inputs.tags }}
        run: |
          tags=""
          if [ -n "$INPUT_TAGS" ]; then
            tags=$(printf 'type=raw,value=%s\n' $(echo "$INPUT_TAGS" | tr ',' ' '))
          fi
          {
            echo "tags<<EOF"
            echo "$tags"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: "Docker Meta"
        id: tags
        uses: docker/metadata-action@902fa8ec7d6ecbf8d84d538b9b233a880e428804 # v5.7.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.USER }}/${{ env.REPO }}
          tags: |
            type=raw,value=${{ github.event.release.tag_name }},enable=${{ github.event_name == 'release' && github.event.release.tag_name != '' }}
            type=raw,value=latest,enable=${{ github.event_name == 'release' && !github.event.release.prerelease }}
            type=raw,value=${{ env.PRE_TAG }},enable=${{ github.event_name == 'release' && github.event.release.prerelease }}
            ${{ steps.override.outputs.tags }}

      - name: "Debug Docker Tags"
        continue-on-error: true
        env:
          INPUT_TAGS: ${{ inputs.tags }}
          META_TAGS: ${{ steps.tags.outputs.tags }}
          META_LABELS: ${{ steps.tags.outputs.labels }}
        run: |
          echo "inputs.tags: $INPUT_TAGS"
          printf 'tags:\n%s\n' "$META_TAGS"
          printf 'labels:\n%s\n' "$META_LABELS"

      - name: "Set App Version"
        run: |
          echo "APP_VERSION: ${GITHUB_REF_NAME}"
          echo "APP_VERSION=${GITHUB_REF_NAME}" >> app/.env

      - name: "Setup Buildx"
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
        with:
          platforms: linux/amd64,linux/arm64

      - name: "Docker Login"
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.GHCR_USER }}
          password: ${{ secrets.GHCR_PASS }}

      - name: "Build and Push"
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          labels: ${{ steps.tags.outputs.labels }}

      - name: "Send Build Notification"
        if: ${{ always() }}
        continue-on-error: true
        uses: sarisia/actions-status-discord@eb045afee445dc055c18d3d90bd0f244fd062708 # v1.16.0
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
