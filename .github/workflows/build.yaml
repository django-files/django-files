name: "Build"

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tags:
        description: "Override Tags: comma,separated"
        required: false

env:
  REGISTRY: "ghcr.io"
  USER: "django-files"
  REPO: "django-files"
  PRE_TAG: "prerelease"

jobs:
  build:
    name: "Build"
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      packages: write

    steps:
      - name: "Checkout"
        uses: actions/checkout@v6

      - name: "Docker Tags"
        id: tags
        uses: cssnr/docker-tags-action@v2
        continue-on-error: true
        with:
          tags: |
            ${{ inputs.tags }}
            ${{ github.event.release.prerelease && env.PRE_TAG || '' }}

      - name: "Debug Docker Tags"
        continue-on-error: true
        run: |
          echo inputs.tags: '${{ inputs.tags }}'
          echo -e "tags:\n${{ steps.tags.outputs.tags }}"
          echo -e "labels:\n${{ steps.tags.outputs.labels }}"

      - name: "Set App Version"
        run: |
          echo "APP_VERSION: ${GITHUB_REF_NAME}"
          echo "APP_VERSION=${GITHUB_REF_NAME}" >> app/.env

      - name: "Setup Buildx"
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
        with:
          platforms: linux/amd64,linux/arm64

      - name: "Docker Login"
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.GHCR_USER }}
          password: ${{ secrets.GHCR_PASS }}

      - name: "Build and Push"
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          labels: ${{ steps.tags.outputs.labels }}

      - name: "Send Build Notification"
        if: ${{ always() }}
        continue-on-error: true
        uses: sarisia/actions-status-discord@eb045afee445dc055c18d3d90bd0f244fd062708 # v1.16.0
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
