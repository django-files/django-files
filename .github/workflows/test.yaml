name: "Test"

on:
  workflow_dispatch:
  push:
    branches: ["master"]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: "Test"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: ${{ !contains(github.event.head_commit.message, '#notest') }}
    env:
      TEST: "True"

    services:
      redis:
        image: redis
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: "Checkout"
        uses: actions/checkout@v6

      - name: "Debug event.json"
        if: ${{ !cancelled() }}
        continue-on-error: true
        run: |
          cat "${GITHUB_EVENT_PATH}"

      - name: "Setup Python 3.14"
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: "Setup uv"
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: "app/requirements-dev.txt"

      - name: "Cache Playwright Browsers"
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('app/requirements-dev.txt') }}

      - name: "Python Install"
        working-directory: app
        run: |
          uv pip install --system -r requirements-dev.txt
          playwright install chromium

      - name: "Debug Python"
        working-directory: app
        continue-on-error: true
        run: |
          uv pip freeze

      - name: "Setup Node"
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "npm"

      - name: "Node Install"
        run: |
          npm install

      - name: "Test Migrations"
        working-directory: app
        env:
          DATABASE_LOCATION: /tmp/migration-test-db
          SECRET_KEY: alsdfjalksdjfllkjdfkerioqweroiu
        run: |
          python manage.py migrate
          python manage.py makemigrations --dry-run --check --noinput

      - name: "Test App"
        working-directory: app
        run: |
          coverage run manage.py test --verbosity 2 --keepdb
          coverage xml
          coverage report

      - name: "Codacy Coverage"
        uses: codacy/codacy-coverage-reporter-action@89d6c85cfafaec52c72b6c5e8b2878d33104c699 # v1.3.0
        with:
          project-token: ${{ secrets.CODACY_PROJECT_TOKEN }}
          coverage-reports: app/coverage.xml

      #- name: "Upload Artifact"
      #  uses: actions/upload-artifact@v3
      #  with:
      #    name: screenshots
      #    path: app/screenshots/

      - name: "Push Artifacts"
        uses: cssnr/push-artifacts-action@master
        continue-on-error: true
        with:
          source: "app/screenshots/"
          dest: "/static"
          host: ${{ secrets.ARTIFACTS_HOST }}
          user: ${{ secrets.RSYNC_USER }}
          pass: ${{ secrets.RSYNC_PASS }}
          port: ${{ secrets.RSYNC_PORT }}
          webhost: "https://artifacts.hosted-domains.com"
          #webhook: ${{ secrets.DISCORD_WEBHOOK }}
          #token: ${{ secrets.GITHUB_TOKEN }}
