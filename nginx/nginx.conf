user    nginx;

worker_processes  4;

error_log  /dev/stderr  warn;

events {
    worker_connections  1024;
}

http {
    sendfile        on;
    include         /etc/nginx/mime.types;
    default_type    application/octet-stream;

    client_max_body_size  1024M;

    log_format  main  '$time_local - $http_x_real_ip [$status] '
                      '$body_bytes_sent $remote_user "$request" '
                      '"$http_referer" "$http_user_agent"';
    access_log  /dev/stdout  main;

    log_format json_logs escape=json
        '{'
            '"time_local":"$time_local",'
            '"remote_addr":"$remote_addr",'
            '"remote_user":"$remote_user",'
            '"request":"$request",'
            '"status": "$status",'
            '"body_bytes_sent":"$body_bytes_sent",'
            '"request_time":"$request_time",'
            '"http_referrer":"$http_referer",'
            '"http_user_agent":"$http_user_agent",'
            '"uri": "$uri"'
        '}';
    access_log  /dev/stdout  json_logs;

    map $uri $basename {
        ~/(?<captured_basename>[^/]*)$ $captured_basename;
    }

    # Extract the stream name from HLS asset URIs so a single signed cookie can
    # cover the manifest (<name>.m3u8) and every segment (<name>-<seq>.ts).
    map $uri $hls_stream_name {
        ~^/hls/(?<name>[^/]+?)(?:-\d+)?\.(?:m3u8|ts)$  $name;
        default                                        "";
    }

    # Same extraction for the parallel /hls-token/ path, which auth_request gates
    # via Django's playback_token instead of cookies (used by VLC / ffmpeg / etc.).
    map $uri $hls_token_stream_name {
        ~^/hls-token/(?<name>[^/]+?)(?:-\d+)?\.(?:m3u8|ts)$  $name;
        default                                              "";
    }

    # Cache zone for /internal/hls-auth subrequest responses. Keys are
    # (playback_token, stream_name) pairs; values are 204 / 403. With a small TTL
    # we keep Django out of the per-segment hot path while still propagating
    # token rotation / disable within a bounded window.
    proxy_cache_path /tmp/hls_auth_cache levels=1:2 keys_zone=hls_auth_cache:1m max_size=8m inactive=10m use_temp_path=off;
    server {
        listen  80;

        location  ~ ^/favicon.(?<extension>[a-z]+)$  {
            alias       /data/static/images/favicon.$extension;
        }
        location  /apple-touch-icon.png  {
            alias       /data/static/images/apple-touch-icon.png;
        }
        location  /static/  {
            alias       /data/static/;
            include     /etc/nginx/mime.types;
            types {
                application/javascript mjs;
            }
        }
        location  /r/  {
            alias       /data/media/files/;
            include     /etc/nginx/raw-mime.types;
            add_header  Access-Control-Allow-Origin *;
            secure_link $arg_md5,$arg_expires;
            secure_link_md5 "$uri$secure_link_expires {{nginx_signing_secret}}";

            if ($secure_link = "") {
                return 403;
            }

            if ($secure_link = "0") {
                return 410;
            }

            if ($arg_download = "true") {
                add_header Content-Disposition "attachment; filename=$basename";
            }
        }

        location /record {
            root /tmp;
            autoindex on;
        }

        #location /hls/stats {
        #    rtmp_stat all;
        #    rtmp_stat_stylesheet /hls/stat.xsl;
        #}
        #
        #location /hls/stat.xsl {
        #    alias /stat.xsl;
        #}

        location /hls/ {
            root /tmp;
            types {
                application/vnd.apple.mpegurl m3u8;
                video/mp2t ts;
            }
            add_header Cache-Control no-cache;
            add_header Access-Control-Allow-Origin *;

            # Gate manifest/segment access on the hls_sig + hls_exp cookies issued by
            # live_view. Signature is bound to the stream name (not full URI) so one
            # cookie covers the manifest and all of its segments.
            secure_link $cookie_hls_sig,$cookie_hls_exp;
            secure_link_md5 "$hls_stream_name$cookie_hls_exp {{nginx_signing_secret}}";

            if ($hls_stream_name = "") {
                return 403;
            }
            if ($secure_link = "") {
                return 403;
            }
            if ($secure_link = "0") {
                return 410;
            }
        }

        # Parallel HLS path for native players (VLC / ffmpeg / etc.) that can't
        # carry the hls_sig/hls_exp browser cookies. Access is gated by an
        # auth_request subrequest into Django which checks the stream's
        # playback_token. The browser cookie path under /hls/ is untouched.
        #
        # The manifest's segment URIs are relative (`<name>-N.ts`); VLC/ffmpeg/
        # hls.js propagate the playlist URL's query string to those segment
        # requests, which is why the same ?token=... works for both. Players
        # that don't propagate query strings won't work here — by design.
        location /hls-token/ {
            alias /tmp/hls/;
            types {
                application/vnd.apple.mpegurl m3u8;
                video/mp2t ts;
            }
            add_header Cache-Control no-cache;
            add_header Access-Control-Allow-Origin *;

            if ($hls_token_stream_name = "") {
                return 403;
            }
            if ($arg_token = "") {
                return 403;
            }

            # Stash the parent request's name and token into request-scoped vars
            # so the subrequest below (whose own $uri/$args refer to
            # /internal/hls-auth) can still see them.
            set $playback_name  $hls_token_stream_name;
            set $playback_token $arg_token;

            auth_request /internal/hls-auth;

            # Players like VLC don't propagate the playlist URL's query string
            # to relative segment URIs (RFC 3986 strips query on relative-ref
            # resolution). Rewrite each .ts line in the m3u8 body so segment
            # requests carry ?token=... and pass the auth_request gate above.
            # Scoped to m3u8 via sub_filter_types so .ts bytes aren't touched.
            sub_filter '.ts'  '.ts?token=$playback_token';
            sub_filter_once   off;
            sub_filter_types  application/vnd.apple.mpegurl;
        }

        # Block direct external access to the playback-token auth endpoint.
        # nginx's auth_request subrequest below bypasses this block because it
        # proxies straight to the `app` upstream — it never re-enters this
        # server block, so this only intercepts public callers attempting to
        # brute-force or DoS the verifier.
        location = /api/stream/hls-auth/ {
            return 404;
        }

        location = /internal/hls-auth {
            internal;
            proxy_pass http://app:9000/api/stream/hls-auth/?name=$playback_name&token=$playback_token;
            proxy_pass_request_body off;
            proxy_set_header        Content-Length "";
            # Strip the caller's cookies/Authorization so the upstream view can't
            # be confused by ambient credentials (the check is purely on
            # name + token).
            proxy_set_header        Cookie "";
            proxy_set_header        Authorization "";
            proxy_cache             hls_auth_cache;
            proxy_cache_valid       204 30s;
            proxy_cache_valid       403 5s;
            proxy_cache_key         "$playback_token:$playback_name";
            proxy_cache_lock        on;
        }

        location  /  {
            proxy_pass          http://app:9000;
            proxy_http_version  1.1;
            proxy_buffering     off;
            proxy_redirect      off;
            proxy_set_header    Host $host;
            proxy_set_header    X-Forwarded-For $remote_addr;
            proxy_set_header    X-Real-IP $remote_addr;
            proxy_set_header    X-Forwarded-Host $server_name;
            proxy_set_header    Upgrade $http_upgrade;
            proxy_set_header    Connection "upgrade";
        }
    }
}

rtmp {
    server {
        listen 1935;
        chunk_size 16384;
        max_message 5242880;

        application live {
            live on;
            hls on;
            hls_path /tmp/hls;
            hls_fragment 2s;
            hls_playlist_length 8s;
            notify_method get;
            on_publish http://app:9000/api/stream/auth/;
            on_done http://app:9000/api/stream/done/;

            include /etc/nginx/conf.rtmp.d/*;
        }
    }
}
