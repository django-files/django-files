user    nginx;

worker_processes  4;

error_log  /dev/stderr  warn;

events {
    worker_connections  1024;
}

http {
    sendfile        on;
    include         /etc/nginx/mime.types;
    default_type    application/octet-stream;

    client_max_body_size  1024M;

    log_format  main  '$time_local - $http_x_real_ip [$status] '
                      '$body_bytes_sent $remote_user "$request" '
                      '"$http_referer" "$http_user_agent"';
    access_log  /dev/stdout  main;

    log_format json_logs escape=json
        '{'
            '"time_local":"$time_local",'
            '"remote_addr":"$remote_addr",'
            '"remote_user":"$remote_user",'
            '"request":"$request",'
            '"status": "$status",'
            '"body_bytes_sent":"$body_bytes_sent",'
            '"request_time":"$request_time",'
            '"http_referrer":"$http_referer",'
            '"http_user_agent":"$http_user_agent",'
            '"uri": "$uri"'
        '}';
    access_log  /logs/nginx.access  json_logs;

    map $uri $basename {
        ~/(?<captured_basename>[^/]*)$ $captured_basename;
    }
    server {
        listen  80;

        location  ~ ^/favicon.(?<extension>[a-z]+)$  {
            alias       /data/static/images/favicon.$extension;
        }
        location  /apple-touch-icon.png  {
            alias       /data/static/images/apple-touch-icon.png;
        }
        location  /static/  {
            alias       /data/static/;
            include     /etc/nginx/mime.types;
            types {
                application/javascript mjs;
            }
        }
        location  /r/  {
            alias       /data/media/files/;
            include     /etc/nginx/raw-mime.types;
            add_header  Access-Control-Allow-Origin *;
            secure_link $arg_md5,$arg_expires;
            secure_link_md5 "$uri$secure_link_expires {{nginx_signing_secret}}";

            if ($secure_link = "") {
                return 403;
            }

            if ($secure_link = "0") {
                return 410;
            }

            if ($arg_download = "true") {
                add_header Content-Disposition "attachment; filename=$basename";
            }
        }

        location /record {
            root /tmp;
            autoindex on;
        }

        #location /hls/stats {
        #    rtmp_stat all;
        #    rtmp_stat_stylesheet /hls/stat.xsl;
        #}
        #
        #location /hls/stat.xsl {
        #    alias /stat.xsl;
        #}

        location /hls/ {
            root /tmp;
            types {
                application/vnd.apple.mpegurl m3u8;
                video/mp2t ts;
            }
            add_header Cache-Control no-cache;
            add_header Access-Control-Allow-Origin *;
        }

        location  /  {
            proxy_pass          http://app:9000;
            proxy_http_version  1.1;
            proxy_buffering     off;
            proxy_redirect      off;
            proxy_set_header    Host $host;
            proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header    X-Forwarded-Host $server_name;
            proxy_set_header    Upgrade $http_upgrade;
            proxy_set_header    Connection "upgrade";
        }
    }
}

rtmp {
    server {
        listen 1935;
        chunk_size 4096;

        application live {
            live on;
            hls on;
            hls_path /tmp/hls;
            hls_fragment 2s;
            hls_playlist_length 8s;
            notify_method get;
            on_publish http://app:9000/api/stream/auth/;
            on_done http://app:9000/api/stream/done/;
            # on_update http://app:9000/api/stream/update/;
            # on_play http://app:9000/api/stream/play/;
            # on_play_done http://app:9000/api/stream/play_done/;

            include /etc/nginx/conf.rtmp.d/*;
        }
    }
}
