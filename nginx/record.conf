# record_path must live on the shared media_dir volume (mounted at /data/media in
# the nginx, app, and worker containers) so the app/worker can read the finished
# recording; a nginx-local path like /tmp is invisible to those containers.
record all;
record_path /data/media/record;
record_suffix -%y%m%d-%T.flv;
on_record_done http://app:9000/api/stream/record/;
